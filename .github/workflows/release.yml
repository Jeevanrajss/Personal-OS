name: Release

# Triggered by pushing a version tag, e.g. git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── macOS (arm64 / Apple Silicon) ────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest   # macos-14 = Apple Silicon (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node + frontend (must build BEFORE PyInstaller — spec bundles frontend/dist) ──
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── Python backend ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install pyinstaller
          pip install -e ./backend

      - name: Build PyInstaller binary (macOS arm64)
        run: |
          cd backend
          pyinstaller backend.spec

      # ── Electron + electron-builder ───────────────────────────────────────
      - name: Build macOS DMG (arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing in CI (users can right-click → Open to bypass Gatekeeper)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          cd electron
          npm ci
          npx electron-builder --mac --arm64

      - name: Upload macOS assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.dmg
            electron/dist/latest-mac.yml
          # Auto-generate release notes from commits since last tag
          generate_release_notes: true

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node + frontend (must build BEFORE PyInstaller — spec bundles frontend/dist) ──
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── Python backend ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install pyinstaller
          pip install -e ./backend

      - name: Build PyInstaller binary (Windows x64)
        run: |
          cd backend
          pyinstaller backend.spec

      # ── Electron + electron-builder ───────────────────────────────────────
      - name: Build Windows NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd electron
          npm ci
          npm run dist:win

      - name: Upload Windows assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.exe
            electron/dist/latest.yml
          generate_release_notes: true
