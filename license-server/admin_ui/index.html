<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal OS — License Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0f;
      --surface:      #141417;
      --surface-elev: #1c1c21;
      --border:       rgba(255,255,255,0.08);
      --border-hi:    rgba(255,255,255,0.15);
      --fg-1:         #f0f0f5;
      --fg-2:         #b8b8c8;
      --fg-3:         #7a7a90;
      --fg-4:         #50505f;
      --primary:      #8b7cff;
      --primary-bg:   rgba(139,124,255,0.12);
      --green:        #3dff98;
      --green-bg:     rgba(61,255,152,0.10);
      --red:          #ff5b6e;
      --red-bg:       rgba(255,91,110,0.10);
      --yellow:       #ffd166;
      --yellow-bg:    rgba(255,209,102,0.10);
      --radius:       10px;
      --font:         -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono:         "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--fg-1);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      width: 360px;
    }
    .login-card h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--fg-1);
    }
    .login-card p { color: var(--fg-3); font-size: 13px; margin-bottom: 24px; }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-bottom: 6px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--fg-1);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--primary); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      width: 100%;
      justify-content: center;
      margin-top: 16px;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .error-msg { color: var(--red); font-size: 12px; margin-top: 10px; }

    /* ── App shell ── */
    #app { display: none; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--primary-bg);
      border: 1px solid rgba(139,124,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .topbar h1 { font-size: 15px; font-weight: 600; color: var(--fg-1); }
    .topbar-sub { font-size: 12px; color: var(--fg-3); }
    .btn-logout {
      background: var(--surface-elev);
      border: 1px solid var(--border);
      color: var(--fg-3);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-logout:hover { color: var(--fg-1); border-color: var(--border-hi); }

    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .stat-card .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-bottom: 6px;
    }
    .stat-card .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--fg-1);
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .toolbar h2 { font-size: 15px; font-weight: 600; color: var(--fg-1); }
    .btn-create {
      background: var(--primary-bg);
      border: 1px solid rgba(139,124,255,0.30);
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-create:hover { background: rgba(139,124,255,0.20); }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--fg-3);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-elev); }
    td {
      padding: 12px 16px;
      vertical-align: middle;
      color: var(--fg-2);
      font-size: 13px;
    }
    td.key-cell {
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--fg-1);
      letter-spacing: 0.03em;
    }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--fg-4); padding: 2px 4px; border-radius: 4px;
      font-size: 11px;
      transition: color 0.1s;
    }
    .copy-btn:hover { color: var(--primary); }

    /* ── Status badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      padding: 3px 9px; border-radius: 999px;
      text-transform: uppercase;
    }
    .badge-active    { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(61,255,152,0.2); }
    .badge-unactivated { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(255,209,102,0.2); }
    .badge-revoked   { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(255,91,110,0.2); }

    /* ── Action buttons in table ── */
    .action-btns { display: flex; gap: 6px; }
    .btn-sm {
      padding: 5px 10px; border-radius: 6px;
      font-size: 11.5px; font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg-3);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--border-hi); color: var(--fg-1); }
    .btn-sm.danger:hover { border-color: rgba(255,91,110,0.4); color: var(--red); background: var(--red-bg); }
    .btn-sm.success:hover { border-color: rgba(61,255,152,0.4); color: var(--green); background: var(--green-bg); }
    .btn-sm:disabled { opacity: 0.4; cursor: default; }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--fg-4);
    }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 14px;
      padding: 28px 32px;
      width: 420px;
      transform: scale(0.97);
      transition: transform 0.15s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .modal p { color: var(--fg-3); font-size: 13px; margin-bottom: 20px; }
    .modal .field { margin-bottom: 14px; }
    .modal .field input[type="text"] { margin-top: 6px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      background: var(--surface-elev); border: 1px solid var(--border);
      color: var(--fg-2); padding: 8px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--border-hi); }
    .btn-confirm {
      background: var(--primary); border: none;
      color: #fff; padding: 8px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-confirm:hover { opacity: 0.88; }
    .btn-confirm:disabled { opacity: 0.5; cursor: default; }

    /* ── Key display after creation ── */
    .new-key-display {
      background: var(--surface-elev);
      border: 1px solid rgba(139,124,255,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--primary);
      text-align: center;
      margin: 16px 0;
      display: none;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface-elev);
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--fg-1);
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Last seen ── */
    .ts { font-size: 11.5px; color: var(--fg-3); font-family: var(--mono); }

    /* ── Loading ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .action-btns { flex-direction: column; }
      .main-content { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<!-- ── Login screen ─────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h1>⬡ Personal OS</h1>
    <p>License Admin Dashboard</p>
    <label class="field-label" for="token-input">Admin Token</label>
    <input type="password" id="token-input" placeholder="Enter your admin token" autocomplete="off" />
    <div class="error-msg" id="login-error"></div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── App ──────────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">⬡</div>
      <div>
        <div class="topbar h1" style="display:inline;font-size:15px;font-weight:600">Personal OS</div>
        <div class="topbar-sub">License Admin</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>

  <div class="main-content">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Total Keys</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="stat-active" style="color:var(--green)">—</div></div>
      <div class="stat-card"><div class="stat-label">Unactivated</div><div class="stat-value" id="stat-unactivated" style="color:var(--yellow)">—</div></div>
      <div class="stat-card"><div class="stat-label">Revoked</div><div class="stat-value" id="stat-revoked" style="color:var(--red)">—</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <h2>Registration Keys</h2>
      <button class="btn-create" onclick="openCreateModal()">+ Create Key</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Owner</th>
            <th>Key</th>
            <th>Status</th>
            <th>Machine</th>
            <th>Last Seen</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="keys-tbody">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-icon">⬡</div><p>Loading…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Create modal ──────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>Create Registration Key</h2>
    <p>A unique key will be generated and assigned to this person.</p>
    <div class="field">
      <label class="field-label" for="create-name">Name *</label>
      <input type="text" id="create-name" placeholder="e.g. Rahul" />
    </div>
    <div class="field">
      <label class="field-label" for="create-email">Email (optional)</label>
      <input type="text" id="create-email" placeholder="rahul@example.com" />
    </div>
    <div class="field">
      <label class="field-label" for="create-notes">Notes (optional)</label>
      <input type="text" id="create-notes" placeholder="e.g. Beta tester" />
    </div>
    <!-- shows after creation -->
    <div class="new-key-display" id="new-key-display"></div>
    <div id="create-error" class="error-msg"></div>
    <div class="modal-footer" id="create-footer">
      <button class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
      <button class="btn-confirm" id="create-confirm-btn" onclick="doCreate()">Generate Key</button>
    </div>
    <div class="modal-footer" id="create-done-footer" style="display:none">
      <button class="btn-confirm" onclick="closeCreateModal()">Done</button>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const BASE = window.location.origin;   // same server that served this page
  let ADMIN_TOKEN = '';

  // ── Auth ────────────────────────────────────────────────────────────────────
  function doLogin() {
    const token = document.getElementById('token-input').value.trim();
    if (!token) return;
    ADMIN_TOKEN = token;
    sessionStorage.setItem('admin_token', token);
    verifyAndShow();
  }

  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function logout() {
    sessionStorage.removeItem('admin_token');
    ADMIN_TOKEN = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('token-input').value = '';
  }

  async function verifyAndShow() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Verifying…';
    try {
      const res = await api('GET', '/admin/keys');
      if (res.ok) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        renderKeys(await res.json());
      } else {
        document.getElementById('login-error').textContent = 'Invalid admin token.';
      }
    } catch {
      document.getElementById('login-error').textContent = 'Could not reach server.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // ── API helper ───────────────────────────────────────────────────────────────
  function api(method, path, body) {
    return fetch(BASE + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${ADMIN_TOKEN}`,
      },
      body: body ? JSON.stringify(body) : undefined,
    });
  }

  // ── Load + render ────────────────────────────────────────────────────────────
  async function loadKeys() {
    try {
      const res = await api('GET', '/admin/keys');
      if (!res.ok) { logout(); return; }
      renderKeys(await res.json());
    } catch {
      toast('Failed to load keys');
    }
  }

  function renderKeys(keys) {
    // Stats
    const total = keys.length;
    const active = keys.filter(k => k.status === 'active').length;
    const unactivated = keys.filter(k => k.status === 'unactivated').length;
    const revoked = keys.filter(k => k.status === 'revoked').length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-unactivated').textContent = unactivated;
    document.getElementById('stat-revoked').textContent = revoked;

    const tbody = document.getElementById('keys-tbody');
    if (keys.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🔑</div><p>No keys yet. Click "Create Key" to add one.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = keys.map(k => `
      <tr id="row-${k.id}">
        <td>
          <div style="font-weight:500;color:var(--fg-1)">${esc(k.owner_name)}</div>
          ${k.owner_email ? `<div style="font-size:11.5px;color:var(--fg-3)">${esc(k.owner_email)}</div>` : ''}
          ${k.notes ? `<div style="font-size:11px;color:var(--fg-4);font-style:italic">${esc(k.notes)}</div>` : ''}
        </td>
        <td class="key-cell">
          ${esc(k.key)}
          <button class="copy-btn" title="Copy" onclick="copyKey('${esc(k.key)}')">⎘</button>
        </td>
        <td>${statusBadge(k.status)}</td>
        <td class="ts">${k.machine_id ? truncate(k.machine_id, 16) : '<span style="color:var(--fg-4)">—</span>'}</td>
        <td class="ts">${k.last_seen_at ? relTime(k.last_seen_at) : '<span style="color:var(--fg-4)">never</span>'}</td>
        <td class="ts">${fmtDate(k.created_at)}</td>
        <td>
          <div class="action-btns">
            ${k.status !== 'revoked'
              ? `<button class="btn-sm danger" onclick="doRevoke('${k.id}', '${esc(k.owner_name)}')">Revoke</button>`
              : `<button class="btn-sm success" onclick="doUnrevoke('${k.id}', '${esc(k.owner_name)}')">Reinstate</button>`
            }
            ${k.machine_id ? `<button class="btn-sm" onclick="doResetDevice('${k.id}', '${esc(k.owner_name)}')">Reset Device</button>` : ''}
            <button class="btn-sm danger" onclick="doDelete('${k.id}', '${esc(k.owner_name)}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Actions ──────────────────────────────────────────────────────────────────
  async function doRevoke(id, name) {
    if (!confirm(`Revoke key for ${name}? They will lose access immediately.`)) return;
    const res = await api('POST', `/admin/keys/${id}/revoke`);
    if (res.ok) { toast(`Revoked key for ${name}`); loadKeys(); }
    else toast('Failed to revoke');
  }

  async function doUnrevoke(id, name) {
    if (!confirm(`Reinstate key for ${name}?`)) return;
    const res = await api('POST', `/admin/keys/${id}/unrevoke`);
    if (res.ok) { toast(`Reinstated key for ${name}`); loadKeys(); }
    else toast('Failed to reinstate');
  }

  async function doResetDevice(id, name) {
    if (!confirm(`Clear device binding for ${name}?\nThey will need to re-activate on their next launch.`)) return;
    const res = await api('POST', `/admin/keys/${id}/reset-device`);
    if (res.ok) { toast(`Device reset for ${name}`); loadKeys(); }
    else toast('Failed to reset device');
  }

  async function doDelete(id, name) {
    if (!confirm(`Permanently delete key for ${name}? This cannot be undone.`)) return;
    const res = await api('DELETE', `/admin/keys/${id}`);
    if (res.ok) { toast(`Deleted key for ${name}`); loadKeys(); }
    else toast('Failed to delete');
  }

  function copyKey(key) {
    navigator.clipboard.writeText(key).then(() => toast('Key copied!'));
  }

  // ── Create modal ─────────────────────────────────────────────────────────────
  function openCreateModal() {
    document.getElementById('create-name').value = '';
    document.getElementById('create-email').value = '';
    document.getElementById('create-notes').value = '';
    document.getElementById('create-error').textContent = '';
    document.getElementById('new-key-display').style.display = 'none';
    document.getElementById('create-footer').style.display = 'flex';
    document.getElementById('create-done-footer').style.display = 'none';
    document.getElementById('create-modal').classList.add('open');
    setTimeout(() => document.getElementById('create-name').focus(), 100);
  }

  function closeCreateModal() {
    document.getElementById('create-modal').classList.remove('open');
    loadKeys();
  }

  async function doCreate() {
    const name = document.getElementById('create-name').value.trim();
    if (!name) { document.getElementById('create-error').textContent = 'Name is required'; return; }
    const email = document.getElementById('create-email').value.trim() || null;
    const notes = document.getElementById('create-notes').value.trim() || null;

    const btn = document.getElementById('create-confirm-btn');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    try {
      const res = await api('POST', '/admin/keys', { owner_name: name, owner_email: email, notes });
      if (res.ok) {
        const data = await res.json();
        const keyDisplay = document.getElementById('new-key-display');
        keyDisplay.textContent = data.key;
        keyDisplay.style.display = 'block';
        document.getElementById('create-footer').style.display = 'none';
        document.getElementById('create-done-footer').style.display = 'flex';
        document.getElementById('create-error').textContent = '';
        navigator.clipboard.writeText(data.key);
        toast(`Key created and copied for ${name}!`);
      } else {
        const err = await res.json();
        document.getElementById('create-error').textContent = err.detail || 'Failed to create key';
      }
    } catch {
      document.getElementById('create-error').textContent = 'Network error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate Key';
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function statusBadge(status) {
    const map = {
      active:      { cls: 'badge-active',      icon: '●', label: 'Active' },
      unactivated: { cls: 'badge-unactivated',  icon: '○', label: 'Not Yet' },
      revoked:     { cls: 'badge-revoked',      icon: '✕', label: 'Revoked' },
    };
    const b = map[status] || map.unactivated;
    return `<span class="badge ${b.cls}">${b.icon} ${b.label}</span>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function relTime(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 30) return `${days}d ago`;
    return fmtDate(iso);
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  const saved = sessionStorage.getItem('admin_token');
  if (saved) {
    ADMIN_TOKEN = saved;
    verifyAndShow();
  }
</script>
</body>
